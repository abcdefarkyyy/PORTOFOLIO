<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Saya</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <!-- Container Utama -->
    <div class="min-h-screen flex flex-col justify-between">
        
        <!-- Area Foto Panjang (Header sudah dihapus) -->
        <main class="flex-grow flex justify-center pt-12 pb-8 px-4">
            <div class="w-full max-w-7xl bg-gray-800 p-2 rounded-xl shadow-2xl border border-gray-700">
                <img 
                    src="Portofolio.png" 
                    alt="Detail Portofolio" 
                    class="w-full h-auto rounded-lg shadow-inner block"
                    loading="lazy"
                >
            </div>
        </main>

        <!-- Footer -->
        <footer class="w-full max-w-7xl mx-auto px-4 py-6 text-center border-t border-gray-800 text-xs text-gray-500">
            &copy; 2026.
        </footer>

    </div>

</body>
